<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portfolio Admin</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23087982'/%3E%3Cpath d='M8 22 15.7 7h2.7L26 22h-3.2l-1.5-3.2h-8.7L11.1 22H8Zm5.7-5.7h6.5L17 9.7l-3.3 6.6Z' fill='white'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main class="admin-shell">
      <section class="admin-panel">
        <div class="admin-header">
          <div>
            <a class="admin-back" href="../">← Back to site</a>
            <h1>Portfolio Admin</h1>
            <p>登录后可从公网编辑并保存个人资料。公开页面会自动读取最新数据库内容。</p>
          </div>
          <button class="button secondary" type="button" data-sign-out hidden>Sign out</button>
        </div>

        <div class="setup-warning" data-setup-warning hidden>
          <strong>Supabase 尚未配置。</strong>
          先在 <code>supabase-config.js</code> 填入你的 Supabase URL 和 anon key，再部署到 GitHub Pages。
        </div>

        <form class="admin-login" data-login-form>
          <label>
            <span>Email</span>
            <input type="email" name="email" placeholder="you@example.com" required />
          </label>
          <label>
            <span>Password</span>
            <input type="password" name="password" placeholder="Your Supabase password" required />
          </label>
          <div class="admin-login-actions">
            <button class="button primary" type="submit">Sign in</button>
            <button class="button secondary" type="button" data-sign-up>Create account</button>
            <button class="button secondary" type="button" data-resend-confirmation>
              Resend confirmation
            </button>
          </div>
          <p class="form-status" data-login-status role="status"></p>
        </form>

        <section class="admin-editor" data-editor hidden>
          <div class="editor-toolbar">
            <div>
              <h2>Profile JSON</h2>
              <p>修改后点击保存。JSON 格式错误时不会写入数据库。</p>
            </div>
            <div class="editor-actions">
              <button class="button secondary" type="button" data-load-default>Load local default</button>
              <button class="button secondary" type="button" data-format-json>Format JSON</button>
              <button class="button primary" type="button" data-save-profile>Save to database</button>
            </div>
          </div>
          <textarea class="json-editor" data-json-editor spellcheck="false"></textarea>
          <p class="form-status" data-editor-status role="status"></p>
        </section>
      </section>
    </main>

    <script src="../supabase-config.js"></script>
    <script type="module" src="./admin.js"></script>
  </body>
</html>
